<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4K Rhythm Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #0e1111; color: #fff; font-family: 'PingFang SC', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        
        #game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* 顶部状态栏 */
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.6); z-index: 10; border-bottom: 1px solid #222; }
        .score-box { font-size: 20px; font-weight: bold; color: #00d2d3; font-variant-numeric: tabular-nums; }
        #pause-btn { padding: 8px 16px; background: #ff4757; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.2s; }
        #pause-btn:active { background: #ff6b81; }

        /* 游戏舞台 */
        #stage { flex: 1; display: flex; position: relative; background: #161a1d; width: 100%; max-width: 480px; margin: 0 auto; border-left: 2px solid #333; border-right: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .lane { flex: 1; border-right: 1px dashed rgba(255,255,255,0.1); position: relative; height: 100%; }
        .lane:last-child { border-right: none; }
        
        /* 判定线 */
        #judgment-line { position: absolute; bottom: 90px; width: 100%; height: 6px; background: linear-gradient(90deg, #00d2d3, #10ac84); box-shadow: 0 0 12px #00d2d3; pointer-events: none; }
        
        /* 音符 */
        .note { position: absolute; width: 92%; left: 4%; height: 18px; background: linear-gradient(180deg, #54a0ff, #2e86de); box-shadow: 0 0 8px #54a0ff; border-radius: 4px; }
        
        /* 判定与Combo显示 */
        #info-overlay { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; z-index: 5; }
        #judgment-text { font-size: 32px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        #combo-text { font-size: 24px; font-weight: bold; color: #feca57; margin-top: 5px; text-shadow: 0 0 8px rgba(0,0,0,0.8); }

        /* 底部手机按键区 */
        #key-bar { display: flex; width: 100%; max-width: 480px; margin: 0 auto; height: 90px; background: #1e272e; z-index: 10; border-top: 2px solid #3d3d3d; }
        .key-btn { flex: 1; border: 1px solid #2f3542; background: linear-gradient(180deg, #2f3542, #1e272e); color: #a4b0be; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: all 0.05s; }
        .key-btn.active { background: linear-gradient(180deg, #54a0ff, #00d2d3); color: #fff; box-shadow: inset 0 0 15px rgba(255,255,255,0.5); }

        /* 弹窗菜单 */
        #menu-modal { display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.2s; }
        .modal-content { background: #2f3542; padding: 25px; border-radius: 12px; text-align: center; width: 85%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #00d2d3; }
        
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; }
        .setting-item label { font-size: 16px; font-weight: bold; }
        .setting-item input[type="range"] { width: 60%; accent-color: #00d2d3; }
        #speed-val { font-variant-numeric: tabular-nums; width: 30px; text-align: right; font-weight: bold; color: #feca57; }

        .menu-btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-resume { background: #2ed573; color: white; }
        .btn-resume:active { background: #26af5f; }
        .btn-restart { background: #ffa502; color: white; }
        .btn-restart:active { background: #eccc68; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-bar">
        <div class="score-box">SCORE: <span id="score">000000</span></div>
        <button id="pause-btn">暂停 ||</button>
    </div>

    <div id="stage">
        <div class="lane" id="lane-0"></div>
        <div class="lane" id="lane-1"></div>
        <div class="lane" id="lane-2"></div>
        <div class="lane" id="lane-3"></div>
        <div id="judgment-line"></div>
        
        <div id="info-overlay">
            <div id="judgment-text"></div>
            <div id="combo-text"></div>
        </div>
    </div>

    <div id="key-bar">
        <div class="key-btn" id="key-0">D</div>
        <div class="key-btn" id="key-1">F</div>
        <div class="key-btn" id="key-2">J</div>
        <div class="key-btn" id="key-3">K</div>
    </div>
</div>

<div id="menu-modal">
    <div class="modal-content">
        <div class="modal-title" id="modal-heading">4K 音游原型</div>
        
        <div class="setting-item">
            <label>流速</label>
            <input type="range" id="speed-slider" min="2" max="12" step="0.5" value="5">
            <span id="speed-val">5.0</span>
        </div>

        <button class="menu-btn btn-resume" id="resume-btn">开始游戏</button>
        <button class="menu-btn btn-restart" id="restart-btn" style="display: none;">从头再来</button>
    </div>
</div>

<script>
    // --- 音频引擎 (Web Audio API) 防止离线/机翻环境断流 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let bgmNode = null;
    let bgmStartTime = 0;
    let bgmPausedAt = 0;
    let isBgmPlaying = false;

    // 自动用代码生成一段复古电子背景音乐 (BGM 序列)
    function createBgmBuffer() {
        const sampleRate = audioCtx.sampleRate;
        const duration = 60; // 60秒循环
        const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
        const data = buffer.getChannelData(0);
        
        // 简单的合成音序逻辑
        const notes = [110, 130, 146, 165, 196, 220, 246, 293]; 
        for (let i = 0; i < buffer.length; i++) {
            let t = i / sampleRate;
            let beat = Math.floor(t * 2); // 每秒2拍
            let note = notes[(beat % 4) + (Math.floor(beat/8) % 2 * 2)];
            // 构造电子波形
            data[i] = Math.sin(2 * Math.PI * note * t) * 0.1 * (1 - (t * 2 % 1));
        }
        return buffer;
    }
    const bgmBuffer = createBgmBuffer();

    function playBGM() {
        if (isBgmPlaying) return;
        bgmNode = audioCtx.createBufferSource();
        bgmNode.buffer = bgmBuffer;
        bgmNode.loop = true;
        
        // 混音与音量控制
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); 
        bgmNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        bgmNode.start(0, bgmPausedAt);
        bgmStartTime = audioCtx.currentTime - bgmPausedAt;
        isBgmPlaying = true;
    }

    function pauseBGM() {
        if (!isBgmPlaying) return;
        bgmNode.stop();
        bgmPausedAt = audioCtx.currentTime - bgmStartTime;
        isBgmPlaying = false;
    }

    function playHitSound() {
        // 瞬间生成高频打击音 (Beep)
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- 游戏主逻辑 ---
    const lanes = [document.getElementById('lane-0'), document.getElementById('lane-1'), document.getElementById('lane-2'), document.getElementById('lane-3')];
    const keyBtns = [document.getElementById('key-0'), document.getElementById('key-1'), document.getElementById('key-2'), document.getElementById('key-3')];
    const scoreEl = document.getElementById('score');
    const judgmentEl = document.getElementById('judgment-text');
    const comboEl = document.getElementById('combo-text');
    
    // UI元素
    const menuModal = document.getElementById('menu-modal');
    const modalHeading = document.getElementById('modal-heading');
    const resumeBtn = document.getElementById('resume-btn');
    const restartBtn = document.getElementById('restart-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');

    let gameState = 'MENU'; // MENU, PLAYING, PAUSED
    let score = 0;
    let combo = 0;
    let noteSpeed = parseFloat(speedSlider.value); // 流速
    let notes = [];
    let nextNoteId = 0;
    let spawnTimer = 0;
    let stageHeight = document.getElementById('stage').clientHeight;
    const judgmentLineY = stageHeight - 90; // 判定线距离顶部的高度

    // 实时监测窗口/舞台高度变化
    window.addEventListener('resize', () => {
        stageHeight = document.getElementById('stage').clientHeight;
    });

    // 速度滑块监听
    speedSlider.addEventListener('input', (e) => {
        noteSpeed = parseFloat(e.target.value);
        speedVal.textContent = noteSpeed.toFixed(1);
    });

    // 核心循环
    function gameLoop() {
        if (gameState !== 'PLAYING') return;

        // 自动随机生成音符
        spawnTimer++;
        if (spawnTimer > Math.max(15, 40 - noteSpeed * 2)) { 
            let randomLane = Math.floor(Math.random() * 4);
            createNoteElement(randomLane);
            spawnTimer = 0;
        }

        // 更新音符位置
        for (let i = notes.length - 1; i >= 0; i--) {
            let note = notes[i];
            note.y += noteSpeed;
            note.el.style.top = note.y + 'px';

            // 漏接判定 (MISS)
            if (note.y > judgmentLineY + 40) {
                showJudgment('MISS', '#ff4757');
                combo = 0;
                updateComboUI();
                note.el.remove();
                notes.splice(i, 1);
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function createNoteElement(laneIndex) {
        const noteEl = document.createElement('div');
        noteEl.className = 'note';
        noteEl.style.top = '-20px';
        lanes[laneIndex].appendChild(noteEl);
        
        notes.push({
            id: nextNoteId++,
            lane: laneIndex,
            y: -20,
            el: noteEl
        });
    }

    // 击键判定核心
    function judgeInput(laneIndex) {
        if (gameState !== 'PLAYING') return;
        
        // 寻找该轨道里最靠下方的音符
        let laneNotes = notes.filter(n => n.lane === laneIndex);
        if (laneNotes.length === 0) return;
        
        let targetNote = laneNotes[0];
        let distance = Math.abs(targetNote.y - (judgmentLineY - 6)); // 计算距离判定线的绝对距离

        if (distance < 25) {
            showJudgment('PERFECT', '#00d2d3');
            score += 100 + combo * 2;
            combo++;
            playHitSound();
            targetNote.el.remove();
            notes = notes.filter(n => n.id !== targetNote.id);
        } else if (distance < 50) {
            showJudgment('GREAT', '#10ac84');
            score += 60 + combo;
            combo++;
            playHitSound();
            targetNote.el.remove();
            notes = notes.filter(n => n.id !== targetNote.id);
        } else if (distance < 80) {
            showJudgment('BAD', '#ffa502');
            combo = 0;
            targetNote.el.remove();
            notes = notes.filter(n => n.id !== targetNote.id);
        }
        
        scoreEl.textContent = String(score).padStart(6, '0');
        updateComboUI();
    }

    function showJudgment(text, color) {
        judgmentEl.textContent = text;
        judgmentEl.style.color = color;
    }

    function updateComboUI() {
        if (combo > 0) {
            comboEl.textContent = combo + ' COMBO';
        } else {
            comboEl.textContent = '';
        }
    }

    // --- 控制交互处理 ---
    function triggerPause() {
        if (gameState === 'PLAYING') {
            gameState = 'PAUSED';
            pauseBGM();
            modalHeading.textContent = "游戏已暂停";
            resumeBtn.textContent = "继续游戏";
            restartBtn.style.display = "block";
            menuModal.style.display = 'flex';
        }
    }

    function triggerResume() {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        gameState = 'PLAYING';
        playBGM();
        menuModal.style.display = 'none';
        gameLoop();
    }

    function triggerRestart() {
        // 清理舞台上的老音符
        notes.forEach(n => n.el.remove());
        notes = [];
        score = 0;
        combo = 0;
        spawnTimer = 0;
        scoreEl.textContent = '000000';
        judgmentEl.textContent = '';
        comboEl.textContent = '';
        
        // 重置音频控制
        pauseBGM();
        bgmPausedAt = 0;
        
        triggerResume();
    }

    // 按钮事件绑定
    pauseBtn.addEventListener('click', triggerPause);
    resumeBtn.addEventListener('click', triggerResume);
    restartBtn.addEventListener('click', triggerRestart);

    // 移动端 Touch 触屏映射
    keyBtns.forEach((btn, index) => {
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            btn.classList.add('active');
            judgeInput(index);
        });
        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            btn.classList.remove('active');
        });
    });

    // 键盘映射 (D, F, J, K) 兼容电脑端测试
    const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3, 'D': 0, 'F': 1, 'J': 2, 'K': 3 };
    window.addEventListener('keydown', (e) => {
        if (e.key in keyMap) {
            let idx = keyMap[e.key];
            keyBtns[idx].classList.add('active');
            judgeInput(idx);
        }
        if (e.key === 'Escape') triggerPause();
    });
    window.addEventListener('keyup', (e) => {
        if (e.key in keyMap) {
            keyBtns[keyMap[e.key]].classList.remove('active');
        }
    });
</script>

</body>
</html>
